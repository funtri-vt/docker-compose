services:
  windows:
    image: dockurr/windows
    container_name: windowsxppro
    environment:
      VERSION: "xp"
      USERNAME: "JaneD"
      PASSWORD: "J@neD0e12#$+-"
    devices:
      - /dev/kvm
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
    ports:
      - 127.0.0.1:8006:8006
      - 127.0.0.1:3389:3389/tcp
      - 127.0.0.1:3389:3389/udp
    volumes:
      - ./windows:/storage
    restart: always
    stop_grace_period: 2m
